apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-service
  namespace: osm
spec:
  replicas: 2
  selector:
    matchLabels:
      app: user-service
  template:
    metadata:
      labels:
        app: user-service
    spec:
      containers:
        - name: user-service
          image: 825621302666.dkr.ecr.ap-southeast-1.amazonaws.com/osm-user-service:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 4001
          envFrom:
            - configMapRef:
                name: osm-config
          env:
            - name: MONGO_URI
              valueFrom:
                secretKeyRef:
                  name: osm-secrets
                  key: MONGO_URI_USER
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: osm-secrets
                  key: JWT_SECRET
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 250m
              memory: 256Mi
          readinessProbe:
            httpGet:
              path: /api/users/
              port: 4001
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /api/users/
              port: 4001
            initialDelaySeconds: 60
            periodSeconds: 20
            failureThreshold: 3

---
apiVersion: v1
kind: Service
metadata:
  name: user-service
  namespace: osm
spec:
  type: ClusterIP
  selector:
    app: user-service
  ports:
    - protocol: TCP
      port: 4001
      targetPort: 4001
