apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway
  namespace: osm
spec:
  replicas: 2
  selector:
    matchLabels:
      app: gateway
  template:
    metadata:
      labels:
        app: gateway
    spec:
      containers:
        - name: gateway
          image: 825621302666.dkr.ecr.ap-southeast-1.amazonaws.com/osm-gateway:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 100m
              memory: 128Mi
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 20
            failureThreshold: 3

---
apiVersion: v1
kind: Service
metadata:
  name: gateway
  namespace: osm
spec:
  # Đổi từ LoadBalancer → ClusterIP: Ingress Controller là entry point duy nhất từ internet
  # Traffic flow: Internet → NGINX Ingress (LB) → services trực tiếp (bypass gateway)
  type: ClusterIP
  selector:
    app: gateway
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
