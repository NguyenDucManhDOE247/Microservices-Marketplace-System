apiVersion: apps/v1
kind: Deployment
metadata:
  name: payment-service
  namespace: osm
spec:
  replicas: 2
  selector:
    matchLabels:
      app: payment-service
  template:
    metadata:
      labels:
        app: payment-service
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "4004"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: payment-service
          image: 825621302666.dkr.ecr.ap-southeast-1.amazonaws.com/osm-payment-service:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 4004
          envFrom:
            - configMapRef:
                name: osm-config
          env:
            - name: MONGO_URI
              valueFrom:
                secretKeyRef:
                  name: osm-secrets
                  key: MONGO_URI_PAYMENT
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: osm-secrets
                  key: JWT_SECRET
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 250m
              memory: 256Mi
          readinessProbe:
            httpGet:
              path: /api/payments/
              port: 4004
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /api/payments/
              port: 4004
            initialDelaySeconds: 30
            periodSeconds: 20
            failureThreshold: 3

---
apiVersion: v1
kind: Service
metadata:
  name: payment-service
  namespace: osm
spec:
  type: ClusterIP
  selector:
    app: payment-service
  ports:
    - protocol: TCP
      port: 4004
      targetPort: 4004
