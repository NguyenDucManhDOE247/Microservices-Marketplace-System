---
# =============================================================================
# Role: jenkins
# Configures Jenkins that was installed by Terraform user_data.
# Responsibilities:
#   1. Wait for Jenkins to be fully up
#   2. Add jenkins user to docker group
#   3. Configure EKS kubeconfig for jenkins user
#   4. Install Jenkins plugins via CLI
#   5. Safe-restart Jenkins to activate plugins
# =============================================================================

# --------------------------------------------------------
# 1. Wait for Jenkins to be fully available
# --------------------------------------------------------
- name: Wait for Jenkins web UI port 8080
  wait_for:
    host: localhost
    port: 8080
    delay: 10
    timeout: 300
    state: started

- name: Wait for Jenkins login page (HTTP 200)
  uri:
    url: "http://localhost:8080/login"
    method: GET
    status_code: 200
    timeout: 30
  register: jenkins_ui_check
  retries: 20
  delay: 15
  until: jenkins_ui_check.status is defined and jenkins_ui_check.status == 200
  when: not ansible_check_mode

# --------------------------------------------------------
# 2. Add jenkins user to docker group
#    (Docker was installed by user_data but jenkins may not be in the group)
# --------------------------------------------------------
- name: Ensure docker group exists
  group:
    name: docker
    state: present

- name: Add jenkins user to docker group
  user:
    name: jenkins
    groups: docker
    append: yes
  notify: restart jenkins

- name: Fix docker socket permissions
  file:
    path: /var/run/docker.sock
    group: docker
    mode: "0660"
  failed_when: false

# --------------------------------------------------------
# 3. Configure EKS kubeconfig for jenkins user
# --------------------------------------------------------
- name: Create .kube directory for jenkins user
  file:
    path: /var/lib/jenkins/.kube
    state: directory
    owner: jenkins
    group: jenkins
    mode: "0700"

- name: Configure EKS kubeconfig for jenkins
  shell: >
    aws eks update-kubeconfig
    --name {{ eks_cluster_name }}
    --region {{ aws_region }}
    --kubeconfig /var/lib/jenkins/.kube/config
  become_user: jenkins
  register: kubeconfig_result
  changed_when: "'Updated context' in kubeconfig_result.stdout or kubeconfig_result.rc == 0"
  failed_when: false

- name: Set correct ownership on kubeconfig
  file:
    path: /var/lib/jenkins/.kube/config
    owner: jenkins
    group: jenkins
    mode: "0600"
  when: kubeconfig_result.rc is defined and kubeconfig_result.rc == 0

- name: Verify kubectl can list EKS nodes
  shell: kubectl --kubeconfig /var/lib/jenkins/.kube/config get nodes --no-headers
  become_user: jenkins
  register: kubectl_check
  changed_when: false
  failed_when: false

- name: Print kubectl verification output
  debug:
    msg: "EKS nodes: {{ kubectl_check.stdout_lines | default([]) }}"
  when: not ansible_check_mode

# --------------------------------------------------------
# 4. Install Jenkins plugins via CLI
# --------------------------------------------------------
- name: Read Jenkins initial admin password
  slurp:
    src: /var/lib/jenkins/secrets/initialAdminPassword
  register: jenkins_init_pass_raw
  failed_when: false

- name: Set jenkins_admin_password fact
  set_fact:
    jenkins_admin_password: "{{ jenkins_init_pass_raw.content | b64decode | trim }}"
  when: jenkins_init_pass_raw.content is defined
  no_log: true

- name: Download Jenkins CLI jar
  get_url:
    url: "http://localhost:8080/jnlpJars/jenkins-cli.jar"
    dest: /tmp/jenkins-cli.jar
    mode: "0644"
    timeout: 60
  when: jenkins_admin_password is defined

- name: Install Jenkins plugins
  shell: >
    java -jar /tmp/jenkins-cli.jar
    -s http://localhost:8080/
    -auth admin:{{ jenkins_admin_password }}
    install-plugin {{ item }} -deploy
  loop: "{{ jenkins_plugins }}"
  when: jenkins_admin_password is defined
  register: plugin_result
  changed_when: plugin_result.rc == 0
  failed_when: false
  no_log: true

- name: Report plugin installation results
  debug:
    msg: "Plugin {{ item.item }}: {{ 'OK' if (item.rc | default(1)) == 0 else 'FAILED/ALREADY INSTALLED' }}"
  loop: "{{ plugin_result.results | default([]) }}"
  loop_control:
    label: "{{ item.item | default('unknown') }}"
  when:
    - not ansible_check_mode
    - plugin_result.results is defined

# --------------------------------------------------------
# 5. Safe-restart Jenkins to activate installed plugins
# --------------------------------------------------------
- name: Safe-restart Jenkins to activate plugins
  shell: >
    java -jar /tmp/jenkins-cli.jar
    -s http://localhost:8080/
    -auth admin:{{ jenkins_admin_password }}
    safe-restart
  when: jenkins_admin_password is defined
  failed_when: false
  no_log: true

- name: Wait for Jenkins to come back up after restart
  wait_for:
    host: localhost
    port: 8080
    delay: 20
    timeout: 300
    state: started

- name: Print Jenkins access info
  debug:
    msg:
      - "======================================"
      - "Jenkins is configured and running"
      - "URL: http://{{ ansible_host }}:8080"
      - "Initial admin password saved at:"
      - "  /var/lib/jenkins/secrets/initialAdminPassword"
      - "======================================"
