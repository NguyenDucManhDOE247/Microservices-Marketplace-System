---
# =============================================================================
# Ansible Inventory - Online Service Marketplace
# =============================================================================
#
# INSTRUCTIONS: Fill in the IPs from Terraform outputs before running.
#
#   cd ../terraform
#   terraform output -raw jenkins_public_ip    → replace JENKINS_PUBLIC_IP
#   terraform output -raw mongodb_private_ip   → replace MONGODB_PRIVATE_IP
#
# SSH access:
#   Jenkins  → direct SSH from your machine (public subnet, port 22 open)
#   MongoDB  → ProxyJump through Jenkins (private subnet, no public IP)
#
# =============================================================================

all:
  vars:
    ansible_user: ubuntu
    ansible_ssh_private_key_file: "{{ playbook_dir }}/../osm-key.pem"
    ansible_python_interpreter: /usr/bin/python3

  children:
    # -------------------------------------------------------------------------
    # Jenkins Server (Public Subnet → direct SSH)
    # -------------------------------------------------------------------------
    jenkins:
      hosts:
        jenkins-server:
          ansible_host: 13.212.51.206 # <-- Replace with terraform output

    # -------------------------------------------------------------------------
    # MongoDB Server (Private Subnet → SSH via Jenkins as bastion)
    # -------------------------------------------------------------------------
    mongodb:
      hosts:
        mongodb-server:
          ansible_host: 10.0.10.45 # <-- Replace with terraform output
          ansible_ssh_common_args: >-
            -o StrictHostKeyChecking=no
            -o UserKnownHostsFile=/dev/null
            -o ProxyJump=ubuntu@13.212.51.206
